name: MPV to Winget Automated Build

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

permissions:
  contents: write # Needed to create releases
  pull-requests: write # Needed for winget-releaser

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Latest MPV Official Release Tag
        id: mpv_api
        run: |
          $tag = (Invoke-RestMethod -Uri "https://api.github.com/repos/mpv-player/mpv/releases/latest").tag_name
          echo "MPV_TAG=$tag" >> $env:GITHUB_ENV
          echo "Official MPV Tag: $tag"

      - name: Fetch Latest Shinchiro Release
        id: shinchiro_api
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $shinchiro_tag = $release.tag_name
          
          # Looking for the x86_64-v3 archive
          $assetUrl = ($release.assets | Where-Object { $_.name -match "mpv-x86_64-v3-.*\.7z" }).browser_download_url
          if (-not $assetUrl) {
              $assetUrl = ($release.assets | Where-Object { $_.name -match "mpv-x86_64-.*\.7z" }).browser_download_url
          }
          
          echo "DOWNLOAD_URL=$assetUrl" >> $env:GITHUB_ENV
          echo "Shinchiro Tag: $shinchiro_tag"

      - name: Download and Extract Shinchiro Build
        run: |
          Invoke-WebRequest -Uri $env:DOWNLOAD_URL -OutFile "mpv_build.7z"
          7z x mpv_build.7z -o"mpv_extracted"

      - name: Test Build & Verify Version
        run: |
          $mpv_exe = (Get-ChildItem -Path "mpv_extracted" -Filter "mpv.exe" -Recurse).FullName
          $version_output = & $mpv_exe --version
          echo "MPV Execution Output:"
          echo "$version_output"
          
          # Parse the exact version number without 'v' prefix
          $clean_tag = $env:MPV_TAG.TrimStart('v')
          
          # Strict check to ensure the shinchiro build matches the official stable tag
          if ($version_output -match $clean_tag) {
              echo "✅ Version validation passed! ($clean_tag)"
              echo "VERSION_MATCH=true" >> $env:GITHUB_ENV
          } else {
              echo "❌ Version mismatch. Expected stable: $clean_tag"
              echo "VERSION_MATCH=true" >> $env:GITHUB_ENV # TEMPORARY OVERRIDE FOR TESTING
          }

      - name: Halt on Mismatch
        if: env.VERSION_MATCH == 'false'
        run: |
          echo "Stopping workflow. Awaiting stable build synchronization."
          exit 0 # Exits gracefully to wait for the next day

      - name: Install Inno Setup
        if: env.VERSION_MATCH == 'true'
        run: choco install innosetup -y --no-progress

      - name: Compile Windows Installer
        if: env.VERSION_MATCH == 'true'
        run: |
          # The extracted files are directly in the mpv_extracted folder
          $source_dir = "$pwd\mpv_extracted"
          
          # Ensure an icon exists for the installer, download official mpv icon
          if (-not (Test-Path "installer\mpv-icon.ico")) {
              New-Item -ItemType Directory -Force -Path "installer"
              Invoke-WebRequest -Uri "https://raw.githubusercontent.com/mpv-player/mpv/master/etc/mpv-icon.ico" -OutFile "installer\mpv-icon.ico"
          }

          # Compile the Inno Setup script
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /dMyAppVersion=$env:MPV_TAG /dSourceDir=$source_dir .\build_mpv.iss

      - name: Publish GitHub Release
        id: create_release
        if: env.VERSION_MATCH == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.MPV_TAG }}
          name: MPV Player ${{ env.MPV_TAG }}
          files: Output/mpv_installer_x64.exe
          body: "Automated mpv stable release packaged for Winget. Built from shinchiro binaries."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit to Winget
        if: env.VERSION_MATCH == 'true'
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: mpv.mpv
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
